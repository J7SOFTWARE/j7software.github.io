<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J7Software | Vývoj Android aplikací</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #0f172a; /* Tmavě modro-šedé pozadí */
            --text-main: #f8fafc; /* Téměř bílý text */
            --text-muted: #94a3b8; /* Tlumený text pro podnadpis */
            --accent: #3ddc84; /* Android zelená */
            --accent-hover: #2ebc6d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            text-align: center;
            padding: 2rem;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 600px;
        }

        /* Název firmy s moderním barevným přechodem */
        h1 {
            font-size: clamp(3rem, 8vw, 5rem);
            font-weight: 800;
            letter-spacing: -0.05em;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #ffffff 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        p.subtitle {
            font-size: clamp(1.1rem, 3vw, 1.5rem);
            color: var(--text-muted);
            font-weight: 400;
            margin-bottom: 3rem;
        }

        /* Tlačítko pro e-mail */
        .contact-btn {
            display: inline-block;
            background-color: rgba(61, 220, 132, 0.1);
            color: var(--accent);
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 600;
            padding: 1rem 2rem;
            border: 1px solid var(--accent);
            border-radius: 50px;
            transition: all 0.3s ease;
        }

        .contact-btn:hover {
            background-color: var(--accent);
            color: var(--bg-color);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(61, 220, 132, 0.2);
        }

        /* Patička s odkazem na soukromí */
        footer {
            margin-top: 2rem;
            padding-top: 2rem;
            width: 100%;
        }

        footer a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s ease;
        }

        footer a:hover {
            color: var(--text-main);
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <main>
        <h1>J7Software</h1>
        <p class="subtitle">Vývoj moderních aplikací pro Android</p>
        
        <a href="mailto:j7software@post.cz" class="contact-btn">j7software@post.cz</a>
    </main>

    <footer>
        <a href="privacy.html">Zásady ochrany osobních údajů (Privacy Policy)</a>
    </footer>

</body>
</html>
