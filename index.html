<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J7Software | Digitální kódování Android aplikací</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-deep: #000712;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --accent: #3ddc84; /* Android zelená */
            --panel-bg: rgba(255, 255, 255, 0.03);
            --panel-border: rgba(255, 255, 255, 0.06);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden; /* Zabrání vodorovnému scrollování na mobilu */
            perspective: 1500px;
            position: relative;
        }

        /* --- Vrstva 1: Canvas pro Matrix Rain --- */
        #matrix-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -2;
            opacity: 0.25; /* Mírně zesílená viditelnost */
            pointer-events: none;
        }

        /* --- Vrstva 2: Dynamické pozadí --- */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: 
                radial-gradient(circle at 15% 15%, rgba(61, 220, 132, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 85% 85%, rgba(29, 78, 216, 0.08) 0%, transparent 50%);
            z-index: -1;
            pointer-events: none;
        }

        /* Hlavní kontejner pro 3D efekt sledování myši */
        #tilt-container {
            width: 100%;
            max-width: 1000px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: transform 0.1s ease-out;
            transform-style: preserve-3d;
            padding: 2rem;
            z-index: 2;
            margin-top: auto;
            margin-bottom: auto;
        }

        /* Hlavní skleněný panel - Glassmorphism */
        main {
            background-color: var(--panel-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--panel-border);
            border-radius: 30px;
            padding: 4rem;
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            position: relative;
            transform: translateZ(50px);
        }

        /* Brand / Nadpis */
        .brand-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 1rem;
            flex-wrap: wrap; /* Pro velmi úzké displeje */
        }

        .android-icon-mini {
            width: 32px; height: 32px;
            fill: var(--accent);
            opacity: 0.9;
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 5.5rem);
            font-weight: 900;
            letter-spacing: -0.05em;
            line-height: 1;
            background: linear-gradient(135deg, #ffffff 30%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        p.subtitle {
            font-size: clamp(1rem, 2.5vw, 1.4rem);
            color: var(--text-muted);
            font-weight: 400;
            max-width: 530px;
            margin-bottom: 3.5rem;
            line-height: 1.5;
        }

        /* Akční karta pro kontakt */
        .contact-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 1.5rem 3rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            transition: all 0.3s ease-out;
            text-decoration: none;
            color: var(--accent);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 400px;
        }

        .contact-card:hover {
            background: rgba(61, 220, 132, 0.05);
            border-color: rgba(61, 220, 132, 0.3);
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 20px 25px -5px rgba(61, 220, 132, 0.2);
        }

        .mail-icon-large {
            width: 36px; height: 36px;
            fill: currentColor;
        }

        .email-text {
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: -0.01em;
            word-break: break-all; /* Aby dlouhý email nepřetekl ven */
        }

        /* --- Plovoucí 3D grafika (PC) --- */
        .satellites {
            position: absolute;
            width: 100%; height: 100%;
            top: 0; left: 0;
            z-index: 1;
            pointer-events: none;
            transform-style: preserve-3d;
        }

        .sat {
            position: absolute;
            background-color: rgba(255, 255, 255, 0.01);
            backdrop-filter: blur(3px);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            animation: float 18s ease-in-out infinite;
        }

        .sat-1 { width: 100px; height: 100px; top: -50px; left: 5%; animation-delay: 0s; transform: translateZ(-100px); }
        .sat-2 { width: 80px; height: 120px; bottom: 10%; right: 2%; animation-delay: -4s; transform: translateZ(-50px); }
        .sat-3 { width: 60px; height: 60px; top: 15%; right: 8%; animation-delay: -9s; border-color: rgba(61, 220, 132, 0.1); transform: translateZ(80px); }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(3deg); }
        }

        /* Patička */
        footer {
            padding: 2rem;
            width: 100%;
            text-align: center;
            z-index: 3;
            position: relative;
        }

        footer a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s ease;
            opacity: 0.6;
        }

        footer a:hover { color: var(--text-main); opacity: 1; }

        /* --- Mobilní zobrazení --- */
        @media (max-width: 768px) {
            body { perspective: none; }
            #tilt-container { transform: none !important; padding: 1rem; margin-top: 2rem;}
            main { padding: 2.5rem 1.5rem; border-radius: 20px; }
            h1 { font-size: 2.8rem; }
            p.subtitle { margin-bottom: 2rem; font-size: 1.1rem; }
            
            /* Změna orientace tlačítka na mobilu - ikona a text vedle sebe */
            .contact-card {
                flex-direction: row;
                padding: 1rem 1.2rem;
                gap: 1rem;
            }
            .mail-icon-large { width: 24px; height: 24px; }
            .email-text { font-size: 1.1rem; }

            /* Vypnutí satelitů, Matrix ale běží dál! */
            .satellites { display: none; } 
        }
    </style>
</head>
<body>

    <canvas id="matrix-canvas"></canvas>

    <div id="tilt-container">
        
        <div class="satellites">
            <div class="sat sat-1"></div>
            <div class="sat sat-2"></div>
            <div class="sat sat-3"></div>
        </div>

        <main>
            <div class="brand-container">
                <svg class="android-icon-mini" viewBox="0 0 24 24"><path d="M17.523 15.3414C17.0211 15.3414 16.611 14.9313 16.611 14.4294C16.611 13.9275 17.0211 13.5174 17.523 13.5174C18.0249 13.5174 18.435 13.9275 18.435 14.4294C18.435 14.9313 18.0249 15.3414 17.523 15.3414ZM6.477 15.3414C5.9751 15.3414 5.565 14.9313 5.565 14.4294C5.565 13.9275 5.9751 13.5174 6.477 13.5174C6.9789 13.5174 7.389 13.9275 7.389 14.4294C7.389 14.9313 6.9789 15.3414 6.477 15.3414ZM17.8761 10.9167L19.7916 7.6017C20.0271 7.1934 19.8876 6.6717 19.4793 6.4362C19.0704 6.2007 18.5487 6.3402 18.3132 6.7485L16.3764 10.1016C15.0135 9.4635 13.5273 9.1179 12 9.1179C10.4727 9.1179 8.9865 9.4635 7.6236 10.1016L5.6868 6.7485C5.4513 6.3402 4.9296 6.2007 4.5207 6.4362C4.1124 6.6717 3.9729 7.1934 4.2084 7.6017L6.1239 10.9167C2.9232 12.6375 0.75 15.894 0.75 19.7001H23.25C23.25 15.894 21.0768 12.6375 17.8761 10.9167Z"></path></svg>
                <h1>J7Software</h1>
            </div>
            
            <p class="subtitle">Digitální kódování prémiových Android aplikací. Čistý kód, úderný design.</p>
            
            <a href="mailto:j7software@post.cz" class="contact-card">
                <svg class="mail-icon-large" viewBox="0 0 24 24"><path d="M22 6c0-1.1-.9-2-2-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6zm-2 0l-8 5-8-5h16zm0 12H4V8l8 5 8-5v10z"></path></svg>
                <span class="email-text">j7software@post.cz</span>
            </a>
        </main>
    </div>

    <footer>
        <a href="privacy.html">Zásady ochrany osobních údajů</a>
    </footer>

    <script>
        // --- Skript 1: Zaručeně funkční Matrix Rain ---
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        const fontSize = 16;
        let columns = 0;
        let drops = [];

        function initMatrix() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            columns = Math.floor(canvas.width / fontSize);
            drops = [];
            // Načtení polohy kapek - rozprostřeme je hned od začátku po celé ploše
            for (let x = 0; x < columns; x++) {
                drops[x] = Math.floor(Math.random() * (canvas.height / fontSize)); 
            }
        }
        
        window.addEventListener('resize', initMatrix);
        initMatrix(); // Prvotní spuštění

        const characters = "アァカサタナハマヤャラワガザダバパイィキシチニヒミリヰギジヂビピウゥクスツヌフムユュルグズブヅプエェケセテネヘメレヱゲゼデベペオォコソトノホモヨョロヲゴゾドボポヴッン0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        const charArray = characters.split('');

        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 7, 18, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = "#3ddc84"; 
            ctx.font = fontSize + "px 'Inter', monospace";

            for (let i = 0; i < drops.length; i++) {
                const text = charArray[Math.floor(Math.random() * charArray.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                // Když znak dojede dolů, náhodně ho vrátíme na začátek
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }

        setInterval(drawMatrix, 35);


        // --- Skript 2: 3D Tilt Effect (Sledování myši - jen pro PC) ---
        const container = document.getElementById('tilt-container');
        const body = document.body;

        if (window.innerWidth > 768) { 
            body.addEventListener('mousemove', (e) => {
                const xAxis = (window.innerWidth / 2 - e.pageX) / 30;
                const yAxis = (window.innerHeight / 2 - e.pageY) / 30;
                container.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
            });

            body.addEventListener('mouseleave', () => {
                container.style.transform = 'rotateY(0deg) rotateX(0deg)';
            });
        }
    </script>

</body>
</html>
