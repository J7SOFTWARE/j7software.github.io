<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J7Software | Digitální kódování Android aplikací</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-deep: #000712; /* Černo-modré hluboké pozadí */
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --accent: #3ddc84; /* Android zelená */
            --accent-glow: rgba(61, 220, 132, 0.4);
            --panel-bg: rgba(255, 255, 255, 0.03); /* Velmi jemné sklo */
            --panel-border: rgba(255, 255, 255, 0.06);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden; /* Zabrání scrollbarům */
            perspective: 1500px; /* Klíč pro 3D hloubku */
            position: relative;
        }

        /* --- Vrstva 1: Canvas pro Matrix Rain --- */
        #matrix-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2; /* Hluboko v pozadí */
            opacity: 0.2; /* Velmi jemný, nerušivý efekt */
        }

        /* --- Vrstva 2: Dynamické pozadí - barevné záře --- */
        body::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: 
                radial-gradient(circle at 15% 15%, rgba(61, 220, 132, 0.12) 0%, transparent 40%),
                radial-gradient(circle at 85% 85%, rgba(29, 78, 216, 0.08) 0%, transparent 40%);
            z-index: -1; /* Nad Matrixem, pod panelem */
            pointer-events: none;
        }

        /* Hlavní kontejner pro 3D efekt sledování myši */
        #tilt-container {
            width: 100%;
            max-width: 1000px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: transform 0.1s ease-out;
            transform-style: preserve-3d;
            padding: 2rem;
            z-index: 2;
        }

        /* Hlavní skleněný panel - Glassmorphism */
        main {
            background-color: var(--panel-bg);
            backdrop-filter: blur(25px); /* Silnější rozostření */
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--panel-border);
            border-radius: 30px;
            padding: 4rem;
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            position: relative;
            transform: translateZ(50px); /* Vystoupí do popředí */
        }

        /* Brand / Nadpis */
        .brand-container {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .android-icon-mini {
            width: 32px; height: 32px;
            fill: var(--accent);
            opacity: 0.8;
        }

        h1 {
            font-size: clamp(3.5rem, 8vw, 5.5rem);
            font-weight: 900;
            letter-spacing: -0.07em;
            line-height: 1;
            background: linear-gradient(135deg, #ffffff 30%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        p.subtitle {
            font-size: clamp(1.1rem, 2.5vw, 1.6rem);
            color: var(--text-muted);
            font-weight: 400;
            max-width: 530px;
            margin-bottom: 3.5rem;
            letter-spacing: -0.01em;
        }

        /* Akční karta pro kontakt */
        .contact-card {
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 20px;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
            transition: all 0.3s ease-out;
            text-decoration: none;
            color: var(--accent);
            position: relative;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        .contact-card:hover {
            background: rgba(61, 220, 132, 0.04);
            border-color: rgba(61, 220, 132, 0.3);
            transform: translateY(-5px) scale(1.03) translateZ(20px);
            box-shadow: 0 20px 25px -5px rgba(61, 220, 132, 0.2);
        }

        .mail-icon-large {
            width: 48px; height: 48px;
            fill: currentColor;
            opacity: 0.9;
        }

        .email-text {
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        /* --- Plovoucí 3D grafika (nad Matrixem, pod panelem) --- */
        .satellites {
            position: absolute;
            width: 100%; height: 100%;
            top: 0; left: 0;
            z-index: 1;
            pointer-events: none;
            transform-style: preserve-3d;
        }

        .sat {
            position: absolute;
            background-color: rgba(255, 255, 255, 0.01);
            backdrop-filter: blur(3px);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            animation: float 18s ease-in-out infinite;
        }

        .sat-1 { width: 100px; height: 100px; top: -70px; left: 8%; animation-delay: 0s; transform: translateZ(-120px); }
        .sat-2 { width: 80px; height: 120px; bottom: 15%; right: 2%; animation-delay: -4s; transform: translateZ(-60px); }
        .sat-3 { width: 60px; height: 60px; top: 15%; right: 12%; animation-delay: -9s; border-color: rgba(61, 220, 132, 0.1); transform: translateZ(90px); }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-25px) rotate(3deg); }
        }

        /* Patička */
        footer {
            margin-top: auto;
            padding: 3rem;
            width: 100%;
            text-align: center;
            z-index: 3;
            position: relative;
        }

        footer a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.2s ease;
            opacity: 0.6;
        }

        footer a:hover { color: var(--text-main); opacity: 1; }

        /* Přizpůsobení pro mobily */
        @media (max-width: 768px) {
            body { overflow: auto; perspective: none; }
            #tilt-container { transform: none !important; padding: 1rem; }
            main { padding: 3rem 1.5rem; border-radius: 20px; }
            h1 { font-size: 3rem; }
            p.subtitle { margin-bottom: 2.5rem; }
            /* ZDE JE ÚPRAVA: #matrix-canvas už není skrytý, satelity (3D kostičky) na mobilu vypínáme */
            .satellites { display: none; } 
        }
    </style>
</head>

            <div class="sat sat-1"></div>

        </div>
