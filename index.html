<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J7Software | Vývoj Android aplikací</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color-1: #0f172a; /* Tmavě modro-šedé pozadí - hlubší tón */
            --bg-color-2: #1e293b; /* Tmavě modro-šedé pozadí - střední tón */
            --text-main: #f8fafc; /* Téměř bílý text */
            --text-muted: #94a3b8; /* Tlumený text pro podnadpis */
            --accent: #3ddc84; /* Android zelená */
            --accent-hover: #2ebc6d;
            --card-color: rgba(255, 255, 255, 0.03); /* Velmi jemná barva karet v grafice */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color-1);
            background-image: 
                radial-gradient(circle at 50% 50%, var(--bg-color-2) 0%, var(--bg-color-1) 100%),
                radial-gradient(circle at 10% 10%, rgba(255, 255, 255, 0.01) 0%, transparent 20%);
            background-size: cover;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }

        /* Velmi jemný, pomalu se pohybující dot pattern */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: radial-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            opacity: 0.2;
            animation: move-dots 60s linear infinite;
            z-index: 0;
        }

        @keyframes move-dots {
            0% { background-position: 0 0; }
            100% { background-position: 30px 30px; }
        }

        main {
            z-index: 1; /* Aby byl obsah nad dot patternem */
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 1000px; /* Širší pro layout text+grafika */
            gap: 4rem; /* Mezera mezi textem a grafikou */
        }

        /* Pravá část s textem */
        .content {
            flex: 1;
            text-align: left; /* Zarovnání textu vlevo */
        }

        /* Název firmy s moderním barevným přechodem */
        h1 {
            font-size: clamp(3rem, 7vw, 5rem);
            font-weight: 800;
            letter-spacing: -0.05em;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #ffffff 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        p.subtitle {
            font-size: clamp(1.1rem, 2vw, 1.4rem);
            color: var(--text-muted);
            font-weight: 400;
            margin-bottom: 3rem;
        }

        /* Styl pro tlačítko a ikonu */
        .contact-block {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        /* Tlačítko pro e-mail */
        .contact-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, rgba(61, 220, 132, 0.2) 0%, rgba(46, 188, 109, 0.1) 100%);
            color: var(--accent);
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 600;
            padding: 1rem 2rem;
            border: 2px solid var(--accent);
            border-radius: 50px;
            transition: all 0.4s ease-out;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .contact-btn:hover {
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-hover) 100%);
            color: var(--bg-color-1);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(61, 220, 132, 0.3);
        }

        /* Jednoduchá ikona e-mailu jako SVG */
        .contact-btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
            margin-right: 0.8rem;
        }

        /* Levá část s grafikou */
        .graphic {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            max-width: 400px;
            position: relative;
        }

        /* Styl pro SVG grafiku */
        .graphic svg {
            width: 100%;
            height: auto;
            max-height: 400px; /* Aby grafika na výšku nepřesáhla rozumnou mez */
            filter: drop-shadow(0 15px 35px rgba(0, 0, 0, 0.4)); /* Přidá jemný stín pro hloubku */
            animation: slow-float 10s ease-in-out infinite; /* Přidá velmi pomalý, plynulý "plující" efekt */
        }

        @keyframes slow-float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(-1deg); }
        }

        /* Patička s odkazem na soukromí */
        footer {
            margin-top: 4rem;
            padding: 2rem;
            width: 100%;
            text-align: center;
            z-index: 1;
            position: relative;
        }

        footer::after {
            content: '';
            position: absolute;
            top: 0; left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 2px;
            background-color: rgba(255, 255, 255, 0.05);
        }

        footer a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }

        footer a:hover {
            color: var(--text-main);
            text-decoration: underline;
        }

        /* Přizpůsobení pro mobily */
        @media (max-width: 768px) {
            main {
                flex-direction: column-reverse; /* Grafika nahoře, text dole */
                gap: 2rem;
                text-align: center; /* Zarovnání textu na střed */
            }

            .content {
                text-align: center;
                display: flex;
                flex-direction: column;
                align-items: center;
            }

            .graphic {
                max-width: 300px; /* Zmenšit grafiku na mobilu */
            }

            .contact-block {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

    <main>
        
        <div class="graphic">
            <svg width="250" height="350" viewBox="0 0 250 350" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="30" y="10" width="190" height="330" rx="30" fill="var(--bg-color-2)" stroke="#222" stroke-width="3"/>
                <rect x="40" y="20" width="170" height="290" rx="20" fill="#0c111d"/>
                <circle cx="125" cy="325" r="12" fill="#222"/>
                <rect x="105" y="10" width="40" height="6" rx="3" fill="#222"/>
                
                <g>
                    <rect x="0" y="100" width="70" height="100" rx="15" fill="var(--accent)" opacity="0.1" transform="rotate(-15 0 100)"/>
                    <rect x="2" y="102" width="66" height="96" rx="14" fill="var(--accent)" opacity="0.05" transform="rotate(-15 0 100)"/>
                    
                    <rect x="180" y="40" width="70" height="100" rx="15" fill="#3abff8" opacity="0.1" transform="rotate(15 180 40)"/>
                    <rect x="182" y="42" width="66" height="96" rx="14" fill="#3abff8" opacity="0.05" transform="rotate(15 180 40)"/>

                    <rect x="80" y="210" width="50" height="70" rx="10" fill="var(--card-color)" />
                    <rect x="130" y="180" width="50" height="70" rx="10" fill="var(--card-color)" />
                </g>
                
                <g opacity="0.3" transform="translate(100, 150)">
                    <rect x="0" y="0" width="50" height="25" rx="5" stroke="var(--accent)" stroke-width="2"/>
                    <rect x="10" y="5" width="30" height="15" rx="2" fill="var(--accent)" opacity="0.1"/>
                </g>
            </svg>
        </div>

        <div class="content">
            <h1>J7Software</h1>
            <p class="subtitle">Vývoj moderních a čistých aplikací pro Android.</p>
            
            <div class="contact-block">
                <a href="mailto:j7software@post.cz" class="contact-btn">
                    <svg viewBox="0 0 24 24"><path d="M22 6c0-1.1-.9-2-2-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6zm-2 0l-8 5-8-5h16zm0 12H4V8l8 5 8-5v10z"></path></svg>
                    j7software@post.cz
                </a>
            </div>
        </div>

    </main>

    <footer>
        <a href="privacy.html">Ochrana osobních údajů (Privacy Policy)</a>
    </footer>

</body>
</html>
